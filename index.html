<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>券策智能审核流程</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="plugin-shell" aria-label="券策智能审核流程组件">
      <ol class="process-strip" aria-label="券策智能审核流程三步">
        <li class="step">
          <span class="step-index">1</span>
          <span class="step-title">提交申请</span>
        </li>

        <li class="connector" aria-hidden="true">
          <span></span>
        </li>

        <li class="step step-featured">
          <span class="step-index">2</span>
          <span class="step-title">智能判断</span>
          <span class="badge">核心判断</span>
        </li>

        <li class="connector" aria-hidden="true">
          <span></span>
        </li>

        <li class="step">
          <span class="step-index">3</span>
          <span class="step-title">查询结果</span>
        </li>
      </ol>
    </main>
  </body>
</html>
