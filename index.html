<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>券策智能审核流程</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="plugin-shell" aria-label="券策智能审核流程组件">
      <section class="process-card">
        <header class="process-header">
          <div>
            <p class="eyebrow">Coupon Review Flow</p>
            <h1>券策智能审核流程</h1>
          </div>
          <p class="subtitle">
            提交申请后，系统自动完成规则校验、风险识别与结果输出。
          </p>
        </header>

        <ol class="steps" aria-label="审核流程三步">
          <li class="step">
            <div class="step-index">1</div>
            <div class="step-copy">
              <h2>提交申请</h2>
            </div>
          </li>

          <li class="connector" aria-hidden="true">
            <span></span>
          </li>

          <li class="step step-featured">
            <div class="step-index">2</div>
            <div class="step-copy">
              <div class="step-title-row">
                <h2>智能判断</h2>
                <span class="badge">核心判断</span>
              </div>
            </div>
          </li>

          <li class="connector" aria-hidden="true">
            <span></span>
          </li>

          <li class="step">
            <div class="step-index">3</div>
            <div class="step-copy">
              <h2>查询结果</h2>
            </div>
          </li>
        </ol>
      </section>
    </main>
  </body>
</html>
